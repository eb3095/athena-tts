apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "athena-tts.fullname" . }}
  labels:
    {{- include "athena-tts.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "athena-tts.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "athena-tts.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena-tts.fullname" . }}-auth
                  key: token
            - name: RATE_LIMIT_REQUESTS
              value: {{ .Values.security.rateLimitRequests | quote }}
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: {{ .Values.security.rateLimitWindowSeconds | quote }}
            - name: AUTH_FAIL_BAN_THRESHOLD
              value: {{ .Values.security.authFailBanThreshold | quote }}
            - name: AUTH_FAIL_BAN_DURATION_SECONDS
              value: {{ .Values.security.authFailBanDurationSeconds | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: model-cache
              mountPath: /root/.local/share/tts
      volumes:
        - name: workspace
          {{- if .Values.persistence.workspace.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "athena-tts.fullname" . }}-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: model-cache
          {{- if .Values.persistence.modelCache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "athena-tts.fullname" . }}-model-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
