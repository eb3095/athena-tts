# Note: With ReadWriteOnce PVCs, only replicaCount: 1 is supported
replicaCount: 1

image:
  repository: ebennerv/athena-tts
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5002

# Set via --set auth.token=<token> or use external secrets for production
auth:
  token: ""

# Rate limiting and security settings
security:
  # Max requests per window (0 to disable)
  rateLimitRequests: 300
  # Rate limit window in seconds
  rateLimitWindowSeconds: 60
  # Number of auth failures before IP ban
  authFailBanThreshold: 3
  # Ban duration in seconds (default: 1 week = 604800)
  authFailBanDurationSeconds: 604800

resources:
  requests:
    memory: "4Gi"
    cpu: "2"
    nvidia.com/gpu: "1"
  limits:
    memory: "8Gi"
    cpu: "4"
    nvidia.com/gpu: "1"

persistence:
  workspace:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  modelCache:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce

ingress:
  enabled: false
  host: ""
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

affinity: {}
