# Note: With ReadWriteOnce PVCs, only replicaCount: 1 is supported
replicaCount: 1

image:
  repository: ebennerv/athena-tts
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5002

# Agent configuration (required - TTS runs as an agent polling athena-server)
agent:
  serverUrl: "http://athena-server:5003"
  key: ""
  pollInterval: 1.0

resources:
  requests:
    memory: "4Gi"
    cpu: "2"
    nvidia.com/gpu: "1"
  limits:
    memory: "8Gi"
    cpu: "4"
    nvidia.com/gpu: "1"

persistence:
  workspace:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  modelCache:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce

ingress:
  enabled: false
  host: ""
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

affinity: {}
